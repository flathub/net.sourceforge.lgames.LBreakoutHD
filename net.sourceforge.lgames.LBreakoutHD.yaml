app-id: net.sourceforge.lgames.LBreakoutHD
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: lbreakouthd
rename-icon: lbreakouthd
rename-desktop-file: lbreakouthd.desktop
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  # LBreakoutHD does not respect XDG base directories
  - --persist=.lbreakouthd
  - --persist=.lbreakouthd/levels
  - --persist=.lbreakouthd/themes
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/aclocal
  - /share/man
  - '*.la'
  - '*.a'
modules:
  - shared-modules/glu/glu-9.json
  - shared-modules/SDL2/SDL2_ttf.json
  - shared-modules/SDL2/SDL2_image.json

  - name: lbreakouthd
    buildsystem: autotools
    config-opts:
      - --localstatedir=/var/data
      #- --datarootdir=/app/shared-modules
    post-install:
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lgames/lbreakouthd/lbreakouthd-1.2.3.tar.gz
        sha256: effca8b96e4a87dfbc92ca1570f4e306e3fcc34efff7451eca11b4b72d1519c8
        x-checker-data:
          type: anitya
          # project-id obtained from https://release-monitoring.org/
          project-id: 308921
          stable-only: true
          url-template: https://downloads.sourceforge.net/project/lgames/lbreakouthd/lbreakouthd-$version.tar.gz
      - type: shell
        commands:
          - cp -p /usr/share/automake-*/config.{sub,guess} .
      - type: file
        path: net.sourceforge.lgames.LBreakoutHD.metainfo.xml
